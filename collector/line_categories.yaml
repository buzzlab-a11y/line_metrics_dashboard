# groups.yaml のグループ名 → ダッシュボードのカテゴリ対応
#   self    : 自社集客アカウント
#   student : 講座生アカウント
#
# groups.yaml にグループを追加したら、ここにも分類を追記する。
# 未定義のグループは self 扱い（フォールバック）。

categories:
  bazz_lab: self
  buzz_lab_kouzasei: student
  kindle_kouza: student

# 個別アカウントの上書き（グループ分類より優先）。account_id 単位。
account_overrides:
  wAVunehfikDi: self      # アミ（kindle_kouzaグループだが自社アカウント扱い）
  JFxp3h8tIYlD: student   # おリュウ（bazz_labグループだが講座生扱い）
